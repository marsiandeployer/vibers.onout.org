<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>op.wpmix.net — Vibers Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f6fa;
    color: #1a1a2e;
    min-height: 100vh;
    overflow: hidden;
  }

/* ══════════════════════════════════════════
     🐛 VISUAL BUG OVERLAY: floating broken button
     Positioned over the iframe to simulate a
     real UI bug on the live product
  ══════════════════════════════════════════ */
  .bug-overlay {
    position: fixed;
    top: 200px;
    left: 320px;
    z-index: 10;
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  /* The broken element — button too narrow, text overflows */
  .broken-widget {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 16px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    position: relative;
    width: 240px;
  }

  .broken-widget__title {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 10px;
  }

  .broken-widget__value {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 12px;
  }

  /* ── BUG: intentionally too narrow button ── */
  .btn-action-wrap {
    position: relative;
    height: 32px;
  }

  .btn-action {
    display: inline-block;
    width: 68px;               /* intentionally too narrow */
    height: 32px;
    background: #2d3a8c;
    border-radius: 6px;
    position: absolute;
    left: 0;
    top: 0;
  }

  .btn-action__label {
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    color: #1f2f73;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- op.wpmix.net embed widget -->
<script src="https://op.wpmix.net/embed.js"></script>

<!-- Visual bug overlay on top -->
<div class="bug-overlay">
  <div class="broken-widget">
    <div class="broken-widget__title">Monthly Revenue</div>
    <div class="broken-widget__value">$48,210</div>
    <div class="btn-action-wrap">
      <span class="btn-action" aria-hidden="true"></span>
      <span class="btn-action__label">View transaction details</span>
    </div>
  </div>
</div>

</body>
</html>
